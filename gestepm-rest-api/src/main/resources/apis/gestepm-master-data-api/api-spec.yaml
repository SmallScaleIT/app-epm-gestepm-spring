openapi: 3.0.3
info:
  title: GestEPM Master Data API
  version: 0.1.0
  description: GestEPM Master Data API
  contact:
    name: Carlos Devesa Pérez
servers:
  - url: /api
paths:
  /v1/activity-centers:
    parameters: []
    get:
      summary: V1 - List activity centers
      operationId: list-activity-centers-v1
      responses:
        '200':
          $ref: '#/components/responses/ActivityCenterList'
      description: list-activity-centers-v1
      parameters:
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-meta
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-links
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-expand
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-pagination-offset
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-pagination-limit
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-order
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-order-by
        - schema:
            type: array
            items:
              type: integer
          in: query
          name: ids
          description: List of activity center ids to filter.
        - schema:
            type: string
          in: query
          name: name
          description: Search by activity center name.
        - schema:
            type: array
            items:
              type: integer
          in: query
          name: countryIds
          description: List of country ids to filter.
      tags:
        - activity-centers-v1
    post:
      summary: V1 - Create activity center
      operationId: create-activity-center-v1
      responses:
        '200':
          $ref: '#/components/responses/ActivityCenter'
        '404':
          description: country-not-found
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
        '409':
          description: activity-center-already-exist
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
      description: create-activity-center-v1
      requestBody:
        $ref: '#/components/requestBodies/CreateActivityCenter'
      tags:
        - activity-centers-v1
  '/v1/activity-centers/{id}':
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      summary: V1 - Find activity center
      responses:
        '200':
          $ref: '#/components/responses/ActivityCenter'
        '404':
          description: activity-center-not-found
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
      operationId: find-activity-center-by-id-v1
      description: find-activity-center-by-id-v1
      parameters:
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-meta
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-links
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-expand
      tags:
        - activity-centers-v1
    put:
      summary: V1 - Update activity center
      operationId: update-activity-center-v1
      responses:
        '200':
          $ref: '#/components/responses/ActivityCenter'
        '404':
          description: activity-center-not-found | country-not-found
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
      description: update-activity-center-v1
      parameters: []
      requestBody:
        $ref: '#/components/requestBodies/UpdateActivityCenter'
      tags:
        - activity-centers-v1
    delete:
      summary: V1 - Delete activity center
      operationId: delete-activity-center-v1
      responses:
        '200':
          description: '**OK**'
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResSuccess
        '404':
          description: activity-center-not-found
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
      description: delete-activity-center-v1
      tags:
        - activity-centers-v1
  /v1/countries:
    get:
      summary: V1 - List countries
      responses:
        '200':
          $ref: '#/components/responses/CountryList'
      operationId: list-countries-v1
      description: list-countries-v1
      parameters:
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-meta
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-links
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-pagination-offset
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-pagination-limit
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-order
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-order-by
        - schema:
            type: array
            items:
              type: integer
          in: query
          name: ids
          description: List of country ids to filter.
        - schema:
            type: string
          in: query
          name: name
          description: Search by country name.
        - schema:
            type: array
            items:
              type: string
          in: query
          name: tags
          description: List of tags to filter.
      tags:
        - countries-v1
    post:
      summary: V1 - Create country
      operationId: create-country-v1
      responses:
        '200':
          $ref: '#/components/responses/Country'
        '409':
          description: country-already-exist
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
      description: create-country-v1
      requestBody:
        $ref: '#/components/requestBodies/CreateCountry'
      tags:
        - countries-v1
    parameters: []
  '/v1/countries/{id}':
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      summary: V1 - Find country
      responses:
        '200':
          $ref: '#/components/responses/Country'
        '404':
          description: country-not-found
      operationId: find-country-by-id-v1
      description: find-country-by-id-v1
      parameters:
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-meta
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-links
      tags:
        - countries-v1
    put:
      summary: V1 - Update country
      operationId: update-country-v1
      responses:
        '200':
          $ref: '#/components/responses/Country'
        '404':
          description: country-not-found
      description: update-country-v1
      requestBody:
        $ref: '#/components/requestBodies/UpdateCountry'
      tags:
        - countries-v1
    delete:
      summary: V1 - Delete country
      operationId: delete-country-v1
      responses:
        '200':
          description: '**OK**'
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResSuccess
        '404':
          description: country-not-found
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
      description: delete-country-v1
      tags:
        - countries-v1
  /v1/levels:
    get:
      summary: V1 - List levels
      tags:
        - levels-v1
      responses:
        '200':
          $ref: '#/components/responses/LevelList'
      operationId: list-levels-v1
      description: list-levels-v1
      parameters:
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-meta
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-links
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-pagination-offset
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-pagination-limit
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-order
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-order-by
        - schema:
            type: array
            items:
              type: integer
          in: query
          name: ids
          description: List of level ids to filter.
        - schema:
            type: string
          in: query
          name: name
          description: Search by level name.
    parameters: []
    post:
      summary: V1 - Create level
      operationId: create-level-v1
      responses:
        '200':
          $ref: '#/components/responses/Level'
        '409':
          description: level-already-exists
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
      tags:
        - levels-v1
      description: create-level-v1
      requestBody:
        $ref: '#/components/requestBodies/CreateLevel'
  '/v1/levels/{id}':
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      summary: V1 - Find level
      tags:
        - levels-v1
      responses:
        '200':
          $ref: '#/components/responses/Level'
        '404':
          description: level-not-found
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
      operationId: find-level-by-id-v1
      description: find-level-by-id-v1
      parameters:
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-meta
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-links
    put:
      summary: V1 - Update Level
      operationId: update-level-v1
      responses:
        '200':
          $ref: '#/components/responses/Level'
        '404':
          description: level-not-found
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
        '409':
          description: level-already-exists
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
      tags:
        - levels-v1
      description: update-level-v1
      requestBody:
        $ref: '#/components/requestBodies/UpdateLevel'
    delete:
      summary: V1 - Delete level
      operationId: delete-level-v1
      responses:
        '200':
          description: '**OK**'
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResSuccess
        '404':
          description: level-not-found
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
      tags:
        - levels-v1
      description: delete-level-v1
  /v1/materials:
    post:
      summary: V1 - Create material
      operationId: create-material-v1
      responses:
        '200':
          $ref: '#/components/responses/Material'
      tags:
        - material-v1
      description: create-material-v1
      requestBody:
        $ref: '#/components/requestBodies/CreateMaterial'
    get:
      summary: V1 - Find material
      tags:
        - material-v1
      responses:
        '200':
          $ref: '#/components/responses/MaterialList'
      operationId: list-materials-v1
      description: list-materials-v1
      parameters:
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-meta
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-links
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-expand
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-pagination-offset
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-pagination-limit
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-order
        - $ref: ../../base-api-spec.yaml#/components/parameters/filter-order-by
        - schema:
            type: array
            items:
              type: integer
          in: query
          name: ids
          description: Filter by material identificator.
        - schema:
            type: string
          in: query
          name: nameContains
          description: Filter by name contains.
        - schema:
            type: boolean
          in: query
          name: required
          description: Filter by material required.
  '/v1/materials/{id}':
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      summary: V1 - Find material
      tags:
        - material-v1
      responses:
        '200':
          $ref: '#/components/responses/Material'
        '404':
          description: material-not-found
      operationId: find-material-by-id-v1
      description: find-material-by-id-v1
      parameters:
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-meta
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-links
        - $ref: ../../base-api-spec.yaml#/components/parameters/api-opt-expand
    put:
      summary: V1 - Update material
      operationId: update-material-v1
      responses:
        '200':
          $ref: '#/components/responses/Material'
        '404':
          description: material-not-found
      description: update-material-v1
      requestBody:
        $ref: '#/components/requestBodies/UpdateMaterial'
      tags:
        - material-v1
    delete:
      summary: V1 - Delete material
      operationId: delete-material-v1
      responses:
        '200':
          description: '**OK**'
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResSuccess
        '404':
          description: material-not-found
          content:
            application/json:
              schema:
                $ref: ../../base-api-spec.yaml#/components/schemas/ResError
      tags:
        - material-v1
      description: delete-material-v1
components:
  schemas:
    ActivityCenter:
      title: ActivityCenter
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        country:
          $ref: '#/components/schemas/Country'
      required:
        - id
        - name
        - country
    Country:
      title: Country
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        tag:
          type: string
      required:
        - id
        - name
        - tag
    Level:
      title: Level
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        hourPrice:
          type: number
          format: double
    Material:
      title: Material
      x-stoplight:
        id: 13bc41a45f6e0
      type: object
      properties:
        id:
          type: integer
        nameEs:
          type: string
          x-stoplight:
            id: qpedqahoau3nj
        nameFr:
          type: string
          x-stoplight:
            id: cj08amr1l0s1e
        required:
          type: boolean
          x-stoplight:
            id: ufkpxfbxrrwqs
      required:
        - id
        - nameEs
        - nameFr
        - required
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  responses:
    ActivityCenter:
      description: Example response
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: ../../base-api-spec.yaml#/components/schemas/Meta
              data:
                $ref: '#/components/schemas/ActivityCenter'
    ActivityCenterList:
      description: Example response
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: ../../base-api-spec.yaml#/components/schemas/Meta
              data:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityCenter'
    Country:
      description: Example response
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: ../../base-api-spec.yaml#/components/schemas/Meta
              data:
                $ref: '#/components/schemas/Country'
    CountryList:
      description: Example response
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: ../../base-api-spec.yaml#/components/schemas/Meta
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Country'
    Level:
      description: Example response
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: ../../base-api-spec.yaml#/components/schemas/Meta
              data:
                $ref: '#/components/schemas/Level'
    LevelList:
      description: Example response
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: ../../base-api-spec.yaml#/components/schemas/Meta
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Level'
    Material:
      description: Example response
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: ../../base-api-spec.yaml#/components/schemas/Meta
              data:
                $ref: '#/components/schemas/Material'
    MaterialList:
      description: Example response
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: ../../base-api-spec.yaml#/components/schemas/Meta
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Material'
  requestBodies:
    CreateActivityCenter:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              countryId:
                type: integer
            required:
              - name
              - countryId
    UpdateActivityCenter:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              countryId:
                type: integer
            required:
              - name
              - countryId
    CreateCountry:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              tag:
                type: string
            required:
              - name
              - tag
    UpdateCountry:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              tag:
                type: string
            required:
              - name
              - tag
    CreateLevel:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              hourPrice:
                type: number
                format: double
    UpdateLevel:
      content:
        application/json:
          schema:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              hourPrice:
                type: number
                format: double
    CreateMaterial:
      content:
        application/json:
          schema:
            type: object
            properties:
              nameEs:
                type: string
                x-stoplight:
                  id: yblix6vp1hg07
              nameFr:
                type: string
                x-stoplight:
                  id: n3ixiykrslv99
              required:
                type: boolean
                x-stoplight:
                  id: d9tbucgnrq307
            required:
              - nameEs
              - nameFr
              - required
    UpdateMaterial:
      content:
        application/json:
          schema:
            type: object
            properties:
              nameEs:
                type: string
                x-stoplight:
                  id: guj0njun0h64v
              nameFr:
                type: string
                x-stoplight:
                  id: 2ji9z75qp6emt
              required:
                type: boolean
                x-stoplight:
                  id: q4v4jawbs4vct
            required:
              - nameEs
              - nameFr
              - required
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Identificator.
tags:
  - name: activity-centers-v1
    description: V1 - Activity centers
  - name: countries-v1
    description: V1 - Countries
  - name: levels-v1
    description: V1 - Levels
  - name: material-v1
    description: V1 - Material
